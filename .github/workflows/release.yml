name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag (for retry), e.g. 0.1.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/ivkond/llm-wiki

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match X.Y.Z, got: ${TAG}" >&2
            exit 1
          fi

          VERSION="${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.vars.outputs.tag }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack and pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.12.4 --activate

      - name: Run release version tooling tests
        run: pnpm test:release-version

      - name: Set package versions from release tag
        run: node scripts/set-release-version.mjs "${{ steps.vars.outputs.version }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package versions match tag
        shell: bash
        run: |
          version="${{ steps.vars.outputs.version }}"
          for pkg in core infra common cli mcp-server; do
            pkg_version=$(node -p "require('./packages/${pkg}/package.json').version")
            if [[ "${pkg_version}" != "${version}" ]]; then
              echo "packages/${pkg} version ${pkg_version} does not match tag version ${version}" >&2
              exit 1
            fi
          done

      - name: Typecheck and build
        run: |
          pnpm typecheck
          pnpm build

      - name: Run tests
        run: pnpm test

      - name: Pack dry-run and validate packed runtime dependencies
        shell: bash
        run: |
          rm -rf .release-pack
          mkdir -p .release-pack
          for pkg in core infra common cli mcp-server; do
            pkg_dir="packages/${pkg}"
            pack_path=$(pnpm --dir "${pkg_dir}" pack --pack-destination ../../.release-pack | tail -n 1)
            pack_file=$(basename "${pack_path}")
            tar -xOf ".release-pack/${pack_file}" package/package.json > ".release-pack/${pkg}.package.json"
            tar -tf ".release-pack/${pack_file}" > ".release-pack/${pkg}.files.txt"
            if grep -q 'workspace:\*' ".release-pack/${pkg}.package.json"; then
              echo "workspace:* dependency found in packed ${pkg}" >&2
              exit 1
            fi

            if [[ "${pkg}" == "cli" || "${pkg}" == "mcp-server" ]]; then
              if node -e "const fs=require('node:fs');const p=JSON.parse(fs.readFileSync('.release-pack/${pkg}.package.json','utf8'));const deps={...(p.dependencies||{}),...(p.optionalDependencies||{}),...(p.peerDependencies||{})};if(Object.keys(deps).some((name)=>/^@llm-wiki\/(core|infra|common)$/.test(name))){process.exit(1)}"; then
                :
              else
                echo "internal @llm-wiki runtime dependency found in packed ${pkg}" >&2
                exit 1
              fi

              if node -e "const fs=require('node:fs');const manifest=JSON.parse(fs.readFileSync('.release-pack/${pkg}.package.json','utf8'));const tarFiles=new Set(fs.readFileSync('.release-pack/${pkg}.files.txt','utf8').trim().split(/\r?\n/).filter(Boolean));const typeTargets=[];if(typeof manifest.types==='string')typeTargets.push(manifest.types);const collect=(value)=>{if(!value)return;if(typeof value==='string')return;if(Array.isArray(value)){for(const item of value)collect(item);return;}if(typeof value==='object'){if(typeof value.types==='string')typeTargets.push(value.types);for(const child of Object.values(value))collect(child);}};collect(manifest.exports);const missing=[...new Set(typeTargets)].map((p)=>p.replace(/^\\.\\//,'')).filter(Boolean).map((p)=>'package/'+p).filter((p)=>!tarFiles.has(p));if(missing.length){console.error('missing packed declaration targets for '+manifest.name+': '+missing.join(', '));process.exit(1)}"; then
                :
              else
                exit 1
              fi

              while IFS= read -r dts_path; do
                [[ "${dts_path}" == package/*.d.ts ]] || continue
                if tar -xOf ".release-pack/${pack_file}" "${dts_path}" | grep -qE '@llm-wiki/(core|infra|common)'; then
                  echo "internal @llm-wiki type import found in packed ${pkg} declaration: ${dts_path}" >&2
                  exit 1
                fi
              done < ".release-pack/${pkg}.files.txt"

              rm -rf ".release-pack/extract-${pkg}"
              mkdir -p ".release-pack/extract-${pkg}"
              tar -xf ".release-pack/${pack_file}" -C ".release-pack/extract-${pkg}"
              if node -e "const fs=require('node:fs');const path=require('node:path');const {builtinModules}=require('node:module');const root='.release-pack/extract-${pkg}/package';const manifest=JSON.parse(fs.readFileSync(path.join(root,'package.json'),'utf8'));const declared=new Set([...Object.keys(manifest.dependencies||{}),...Object.keys(manifest.optionalDependencies||{}),...Object.keys(manifest.peerDependencies||{})]);const builtins=new Set(builtinModules.flatMap((m)=>m.startsWith('node:')?[m.slice(5),m]:[m,'node:'+m]));const jsFiles=[];const walk=(dir)=>{for(const entry of fs.readdirSync(dir,{withFileTypes:true})){const p=path.join(dir,entry.name);if(entry.isDirectory())walk(p);else if(entry.isFile()&&p.endsWith('.js'))jsFiles.push(p);}};walk(path.join(root,'dist'));const extractPkg=(s)=>s.startsWith('@')?s.split('/').slice(0,2).join('/'):s.split('/')[0];const unresolved=new Set();for(const file of jsFiles){const src=fs.readFileSync(file,'utf8');const re=/(?:import|export)\\s+[^'\"]*?from\\s*[\"']([^\"']+)[\"']|import\\(\\s*[\"']([^\"']+)[\"']\\s*\\)/g;let m;while((m=re.exec(src))){const spec=m[1]||m[2];if(!spec||spec.startsWith('.')||spec.startsWith('/'))continue;if(builtins.has(spec)||builtins.has(spec.split('/')[0]))continue;const pkgName=extractPkg(spec);if(!declared.has(pkgName))unresolved.add(pkgName);}}if(unresolved.size){console.error('undeclared runtime imports in packed '+manifest.name+': '+[...unresolved].sort().join(', '));process.exit(1)}"; then
                :
              else
                exit 1
              fi
            fi
          done

      - name: Build Docker image for validation
        run: docker build -f packages/mcp-server/Dockerfile -t llm-wiki-mcp:ci .

      - name: Smoke test Docker image startup
        shell: bash
        run: |
          cid=$(docker run -d --rm -p 7849:7849 \
            -e LLM_WIKI_PATH=/tmp/.llm-wiki \
            -e LLM_WIKI_MCP_HOST=0.0.0.0 \
            llm-wiki-mcp:ci)
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          rc=1
          for _ in {1..20}; do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/7849' >/dev/null 2>&1; then
              rc=0
              break
            fi
            sleep 1
          done

          if [[ "$rc" != "0" ]]; then
            docker logs "$cid" || true
          fi

          set -e
          if [[ "$rc" != "0" ]]; then
            echo "Docker smoke test failed with exit code ${rc}" >&2
            exit 1
          fi

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          COREPACK_ENABLE_PROJECT_SPEC: 0
        shell: bash
        run: |
          (cd packages/cli && npm publish --access public)
          (cd packages/mcp-server && npm publish --access public)

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish MCP image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ steps.vars.outputs.version }}
            ${{ env.REGISTRY_IMAGE }}:latest
